services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Historical Database for Trace Agricultural AI System
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: trace_postgres
    restart: unless-stopped
    env_file:
      - .env                          # Provides POSTGRES_* vars — never hardcode here
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata   # persistent data volume
      - ./historical_db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - trace_net

  # ---------------------------------------------------------------------------
  # Trace API (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: trace_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - trace_net

  # ---------------------------------------------------------------------------
  # Trace Worker (LangGraph orchestration)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: trace_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - trace_net

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  trace_net:
    driver: bridge
