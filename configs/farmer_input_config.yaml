# configs/farmer_input_config.yaml
# ==================================
# Configuration for the Farmer Input ingestion and preprocessing pipeline.
# Used by:
#   - ingestion/farmer_input_ingestion.py
#   - preprocessing/farmer_input_preprocessor.py
#   - api/routes/farmer_input.py

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
database:
  # For local development, use SQLite (aiosqlite driver).
  # For production, swap to PostgreSQL:
  #   url: "postgresql+asyncpg://user:password@host:5432/agri_db"
  url: "sqlite+aiosqlite:///./agri.db"

  tables:
    farmer_inputs: "farmer_inputs"
    failed_inputs: "failed_inputs"

# ---------------------------------------------------------------------------
# SMS Provider
# ---------------------------------------------------------------------------
sms:
  # Supported: "twilio" | "africas_talking"
  provider: "twilio"

  twilio:
    account_sid: "TWILIO_ACCOUNT_SID"         # Overridden by env var
    auth_token: "TWILIO_AUTH_TOKEN"            # Overridden by env var
    webhook_secret: "TWILIO_WEBHOOK_SECRET"    # For signature validation
    phone_number: "+1234567890"                # Your Twilio number

  africas_talking:
    api_key: "AT_API_KEY"
    username: "agri_platform"
    shortcode: "20880"
    webhook_secret: "AT_WEBHOOK_SECRET"

# ---------------------------------------------------------------------------
# Supported Crop Types
# ---------------------------------------------------------------------------
# These values are used for one-hot encoding and dropdown population.
crops:
  - wheat
  - rice
  - maize
  - cotton
  - sugarcane
  - soybean
  - groundnut
  - millet
  - sorghum
  - tomato
  - potato
  - onion
  - chilli
  - mustard
  - barley

# ---------------------------------------------------------------------------
# Supported Issue Types
# ---------------------------------------------------------------------------
issues:
  - pest
  - disease
  - drought
  - flood
  - other

