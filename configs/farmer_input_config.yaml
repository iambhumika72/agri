# ---------------------------------------------------------------------------
# Time-Series Alignment
# ---------------------------------------------------------------------------
timeseries:
  # Pandas frequency alias. "D" = daily, "W" = weekly, "H" = hourly.
  frequency: "D"

  # When records lack a date_observed, fall back to today minus this offset (days).
  date_fallback_offset_days: 0

# ---------------------------------------------------------------------------
# Preprocessing
# ---------------------------------------------------------------------------
preprocessing:
  # Severity → numeric mapping (used in FarmerInputPreprocessor)
  severity_map:
    low: 1
    medium: 2
    high: 3

  # Null imputation strategy: "zero" | "mean" | "ffill"
  numeric_null_strategy: "zero"
  string_null_strategy: "unknown"
